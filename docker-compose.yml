# UNICHE IdP — brings up ONLY the identity provider (Keycloak + its Postgres).
# The Catalogue and Portal run from their own repos and reach this IdP over the shared
# external Docker network `uniche` at the issuer URL configured below.
#
# First-time setup on the host:
#   docker network create uniche
#   cp .env.example .env
# Then:
#   docker compose up -d --build
name: uniche-idp

services:
  keycloak-db:
    image: postgres:16.6-bookworm@sha256:557fea37a744d5f4c8faab304b0a90858b53ab119735a88c131fd19dab802f36
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak} -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${IDP_DB_PORT:-5433}:5432"
    networks: [uniche]

  keycloak:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: uniche/idp:0.1.0
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # ISSUER-CONSISTENCY [critical]: this is the `iss` the browser (Portal login) AND the backend
      # (Catalogue token validation) must BOTH use. Keep it fixed; do not enable hostname-dynamic.
      KC_HOSTNAME: http://uniche-idp.localhost:${IDP_HTTP_PORT:-8081}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    command: ["start", "--optimized", "--import-realm"]
    # Lets the browser-facing hostname (host.docker.internal) resolve from inside the container too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${IDP_HTTP_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '\"status\": \"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks: [uniche]

networks:
  uniche:
    external: true

volumes:
  keycloak-db-data:
